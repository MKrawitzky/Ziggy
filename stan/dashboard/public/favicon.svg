<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="b">
      <!-- Classic lightning bolt: upper segment angles down-left, lower segment angles down-right -->
      <polygon points="21,1 13,1 10,16 16,16 12,31 23,17 17,17 21,1"/>
    </clipPath>
  </defs>
  <!-- Dark background matching app theme -->
  <rect width="32" height="32" fill="#011a3a" rx="3"/>
  <!-- Left half of bolt: blue (cool side, like Aladdin Sane) -->
  <rect width="17" height="32" fill="#58a6ff" clip-path="url(#b)"/>
  <!-- Right half of bolt: gold (warm side) -->
  <rect x="17" width="15" height="32" fill="#DAAA00" clip-path="url(#b)"/>
</svg>
